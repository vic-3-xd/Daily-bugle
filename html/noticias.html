<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Bugle - Noticias</title>
  <meta name="description" content="Todas las últimas noticias del Daily Bugle: Spider-Man, villanos, hechos y reportajes de Nueva York.">
  <meta name="keywords" content="Daily Bugle, noticias, Spider-Man, villanos">
  <link rel="icon" type="image/svg+xml" href="../img/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Slab:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-pagina="noticias">
  <a class="skip-link" href="#contenido">Saltar al contenido principal</a>
  <div id="header-slot"></div>

 

    <section class="news-section" aria-labelledby="news-titulo">
      <div class="section-header scroll-animate">
        <span class="section-line" aria-hidden="true"></span>
        <h2 id="news-titulo">Últimas Noticias</h2>
        <span class="section-line" aria-hidden="true"></span>
      </div>

      <div class="news-filters" role="group" aria-label="Filtrar por categoría">
        <button type="button" class="filter-btn active" data-filter="todas" aria-pressed="true">Todas</button>
        <button type="button" class="filter-btn" data-filter="Spider-Man" aria-pressed="false">Spider-Man</button>
        <button type="button" class="filter-btn" data-filter="Duende" aria-pressed="false">Duende</button>
        <button type="button" class="filter-btn" data-filter="Venom" aria-pressed="false">Venom</button>
        <button type="button" class="filter-btn" data-filter="Octopus" aria-pressed="false">Doc Ock</button>
        <button type="button" class="filter-btn" data-filter="Lagarto" aria-pressed="false">Lagarto</button>
        <button type="button" class="filter-btn" data-filter="Electro" aria-pressed="false">Electro</button>
        <button type="button" class="filter-btn" data-filter="Escorpión" aria-pressed="false">Escorpión</button>
      </div>

      <div class="news-grid" id="news-grid">
        <!-- Se llena con JS -->
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="../js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('news-grid');
      const filtroInicial = getQueryParam('q') || 'todas';

      function pintar(filtro, animar = true) {
        let lista;
        if (filtro === 'todas') {
          lista = NOTICIAS;
        } else {
          const t = filtro.toLowerCase();
          lista = NOTICIAS.filter(n =>
            n.titulo.toLowerCase().includes(t) ||
            n.resumen.toLowerCase().includes(t) ||
            (n.keywords || []).some(k => k.includes(t))
          );
        }
        if (lista.length === 0) {
          grid.innerHTML = `<p class="no-resultados">No hay noticias en esta categoría.</p>`;
        } else {
          grid.innerHTML = lista.map(renderNoticiaCard).join('');
          if (animar) {
            animarCards('news-grid');
            setupTilt('#news-grid .news-card');
          }
        }
      }

      pintar(filtroInicial);

      document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.filter === filtroInicial) {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-pressed', 'true');
        }
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-pressed', 'true');
          // Mostrar skeleton mientras "carga"
          mostrarSkeleton('news-grid', 6);
          setTimeout(() => {
            try {
              pintar(btn.dataset.filter);
              grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (e) {
              grid.innerHTML = `<p class="no-resultados">Error al cargar noticias.</p>`;
            }
          }, 400);
        });
      });
    });
  </script>
</body>
</html>
