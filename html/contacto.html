<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Bugle - Contacto</title>
  <meta name="description" content="Contacta al Daily Bugle. Envía tus reportes, fotos o tips noticiosos al periódico de Nueva York.">
  <link rel="icon" type="image/svg+xml" href="../img/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Roboto+Slab:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-pagina="contacto">
  <a class="skip-link" href="#contenido">Saltar al contenido principal</a>
  <div id="header-slot"></div>

  

    <section class="form-section">
      <div class="section-header scroll-animate">
        <span class="section-line" aria-hidden="true"></span>
        <h2>Contacta al Bugle</h2>
        <span class="section-line" aria-hidden="true"></span>
      </div>

      <p class="form-intro">¿Tienes información exclusiva, fotos o un tip noticioso? Envíanos un mensaje y nuestro equipo editorial lo revisará.</p>

      <form class="form-noticia" id="form-contacto" novalidate>
        <div class="form-grupo">
          <label for="nombre">Nombre completo *</label>
          <input type="text" id="nombre" name="nombre" required minlength="3" aria-required="true">
          <span class="form-error" id="error-nombre" aria-live="polite"></span>
        </div>

        <div class="form-grupo">
          <label for="email">Correo electrónico *</label>
          <input type="email" id="email" name="email" required aria-required="true">
          <span class="form-error" id="error-email" aria-live="polite"></span>
        </div>

        <div class="form-grupo">
          <label for="asunto">Asunto *</label>
          <select id="asunto" name="asunto" required aria-required="true">
            <option value="">Selecciona un asunto</option>
            <option value="tip">Tip noticioso</option>
            <option value="foto">Envío de fotos</option>
            <option value="entrevista">Solicitud de entrevista</option>
            <option value="publicidad">Publicidad</option>
            <option value="otro">Otro</option>
          </select>
          <span class="form-error" id="error-asunto" aria-live="polite"></span>
        </div>

        <div class="form-grupo">
          <label for="mensaje">Mensaje *</label>
          <textarea id="mensaje" name="mensaje" rows="6" required minlength="20" aria-required="true" placeholder="Cuéntanos los detalles..."></textarea>
          <span class="form-error" id="error-mensaje" aria-live="polite"></span>
        </div>

        <div class="form-grupo form-checkbox">
          <input type="checkbox" id="acepto" name="acepto" required aria-required="true">
          <label for="acepto">Acepto la política de privacidad *</label>
        </div>

        <button type="submit" class="form-boton">Enviar mensaje</button>

        <div class="form-exito" id="form-exito" role="status" aria-live="polite" hidden>
          ¡Mensaje enviado con éxito! El equipo editorial del Daily Bugle se pondrá en contacto contigo pronto.
        </div>
      </form>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="../js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('form-contacto');
      const exito = document.getElementById('form-exito');

      function mostrarError(id, mensaje) {
        const el = document.getElementById(id);
        if (el) el.textContent = mensaje;
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        let valido = true;

        const nombre = document.getElementById('nombre');
        const email = document.getElementById('email');
        const asunto = document.getElementById('asunto');
        const mensaje = document.getElementById('mensaje');
        const acepto = document.getElementById('acepto');

        mostrarError('error-nombre', '');
        mostrarError('error-email', '');
        mostrarError('error-asunto', '');
        mostrarError('error-mensaje', '');

        if (nombre.value.trim().length < 3) {
          mostrarError('error-nombre', 'El nombre debe tener al menos 3 caracteres.');
          valido = false;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email.value)) {
          mostrarError('error-email', 'Ingresa un correo electrónico válido.');
          valido = false;
        }

        if (!asunto.value) {
          mostrarError('error-asunto', 'Selecciona un asunto.');
          valido = false;
        }

        if (mensaje.value.trim().length < 20) {
          mostrarError('error-mensaje', 'El mensaje debe tener al menos 20 caracteres.');
          valido = false;
        }

        if (!acepto.checked) {
          alert('Debes aceptar la política de privacidad.');
          valido = false;
        }

        if (valido) {
          exito.hidden = false;
          form.reset();
          exito.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
    });
  </script>
</body>
</html>
